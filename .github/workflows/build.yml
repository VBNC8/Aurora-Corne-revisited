name: Build Aurora Corne Isolated
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Config
        uses: actions/checkout@v4
        with:
          path: config-repo

      - name: Install West
        run: pip3 install west

      - name: Setup ZMK Workspace
        run: |
          # Initialisiere ZMK mit dem korrekten Pfad zur west.yml (app/west.yml)
          west init zmk_workspace -m https://github.com/zmkfirmware/zmk --mr main --mf app/west.yml
          cd zmk_workspace
          west update
          west zephyr-export
          
          # Fix für den Board-Duplikat-Fehler (Pillbug)
          # Wir löschen das Modul, das den Konflikt verursacht
          rm -rf modules/lib/pillbug 2>/dev/null || true

      - name: Build Left (nice!view + RGB)
        run: |
          cd zmk_workspace
          west build -s app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${{ github.workspace }}/config-repo/config"

      - name: Build Right (RGB + Encoder/Scroll)
        run: |
          cd zmk_workspace
          # WICHTIG: Vor dem zweiten Build den ersten Build-Ordner löschen oder -d nutzen
          rm -rf build
          west build -s app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${{ github.workspace }}/config-repo/config"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aurora_Corne_Firmware
          path: |
            zmk_workspace/build/zephyr/zmk.uf2
