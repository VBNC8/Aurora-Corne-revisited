name: Build Aurora Corne
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install West
        run: pip3 install west

      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export
          # Fix für den Board-Error (Pillbug-Definition löschen)
          rm -rf modules/lib/pillbug 2>/dev/null || true

      - name: Build Left (nice!view + RGB)
        run: |
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Left
        run: cp build/zephyr/zmk.uf2 aurora_left.uf2

      - name: Build Right (RGB + Encoder)
        run: |
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Right
        run: cp build/zephyr/zmk.uf2 aurora_right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aurora_Corne_Firmware
          path: |
            aurora_left.uf2
            aurora_right.uf2
