name: Build Aurora Corne Special
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install West
        run: pip3 install west

      - name: Setup & Patch Workspace
        run: |
          west init -l config
          west update
          west zephyr-export
          # Fix für den Pillbug-Error: Doppelte Boards entfernen
          rm -rf modules/lib/pillbug 2>/dev/null || true

      - name: Build Left (EC11 + Display)
        run: |
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right (Scrollrad)
        run: |
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Aurora_Firmware
          path: build/zephyr/zmk.uf2
