name: Build Aurora Corne
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Create Temporary Fix Overlay
        # Wir erstellen eine Datei, die nice_view_spi auf spi3 mappt
        run: |
          mkdir -p config
          echo '/ { nice_view_spi: &spi3 { }; };' > config/fix_display.overlay

      - name: Build Left (nice!view + RGB)
        run: |
          cd zmk/app
          # Wir fügen fix_display zur Shield-Liste hinzu
          west build -b nice_nano -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" -Dextra_conf_file="${GITHUB_WORKSPACE}/config/fix_display.overlay"
          cp build/zephyr/zmk.uf2 ../../aurora_left.uf2

      - name: Build Right (RGB + Encoder/Scroll)
        run: |
          cd zmk/app
          rm -rf build
          west build -b nice_nano -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 ../../aurora_right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aurora_Corne_Firmware
          path: |
            aurora_left.uf2
            aurora_right.uf2
