name: Build Aurora Corne
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize West
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Patch nice_nano for nice_view
        # Wir fügen den Alias 'nice_view_spi' sicher am Ende des Board-Files hinzu.
        # Die Syntax / { ... }; sorgt dafür, dass es ein Root-Level-Override ist.
        run: |
          BOARD_FILE="zmk/app/module/boards/nicekeyboards/nice_nano/nice_nano.dts"
          echo '/ { aliases { nice-view-spi = &spi3; }; };' >> $BOARD_FILE
          echo '&spi3 { nice_view_spi: &spi3 { status = "okay"; }; };' >> $BOARD_FILE

      - name: Build Left (nice!view + RGB)
        run: |
          cd zmk/app
          west build -b nice_nano -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 ../../aurora_left.uf2

      - name: Build Right (RGB + Encoder/Scroll)
        run: |
          cd zmk/app
          rm -rf build
          west build -b nice_nano -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 ../../aurora_right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aurora_Corne_Firmware
          path: |
            aurora_left.uf2
            aurora_right.uf2
