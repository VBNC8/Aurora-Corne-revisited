name: Build Aurora Corne Isolated
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Config
        uses: actions/checkout@v4
        with:
          path: config-repo

      - name: Hard Cleanup
        run: |
          # Löscht alle mitgebrachten Altlasten, die den Board-Scan stören
          rm -rf config-repo/zmk config-repo/zephyr config-repo/shields config-repo/modules

      - name: Install West
        run: pip3 install west

      - name: Clone ZMK Main
        run: |
          # Wir klonen ZMK frisch in einen separaten Ordner 'zmk_src'
          git clone https://github.com/zmkfirmware/zmk.git zmk_src
          cd zmk_src
          west init -l app/
          west update
          west zephyr-export
          # Fix für Pillbug-Duplikat in den Standard-Modulen
          rm -rf ../modules/lib/pillbug 2>/dev/null || true

      - name: Build Left (nice!view + RGB)
        run: |
          cd zmk_src
          west build -s app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="${{ github.workspace }}/config-repo/config"
          cp build/zephyr/zmk.uf2 ../aurora_left.uf2

      - name: Build Right (RGB + Encoder/Scroll)
        run: |
          cd zmk_src
          rm -rf build 
          west build -s app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="${{ github.workspace }}/config-repo/config"
          cp build/zephyr/zmk.uf2 ../aurora_right.uf2

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aurora_Corne_Firmware
          path: |
            aurora_left.uf2
            aurora_right.uf2
