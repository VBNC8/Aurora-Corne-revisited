name: Build Aurora Corne
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: config  # Dein Repo landet im Unterordner 'config'

      - name: Install West
        run: pip3 install west

      - name: Initialize West Workspace
        run: |
          west init -m https://github.com/zmkfirmware/zmk --mr main workspace
          cd workspace
          # Wir überschreiben die Standard-Config mit DEINER Config
          rm -rf config
          cp -r ../config config
          west update
          west zephyr-export

      - name: Build Left
        run: |
          cd workspace
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="$(pwd)/config"

      - name: Build Right
        run: |
          cd workspace
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right nice_view_adapter nice_view" -DZMK_CONFIG="$(pwd)/config"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aurora_Corne_Firmware
          path: |
            workspace/build/zephyr/zmk.uf2
