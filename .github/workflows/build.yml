name: Build Aurora Corne Isolated
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: my_config  # Checkt dein Repo in den Ordner 'my_config'

      - name: Install West
        run: pip3 install west

      - name: Setup Isolated Workspace
        run: |
          # Initialisiere ZMK in einem sauberen Unterordner 'zmk_workspace'
          west init zmk_workspace -m https://github.com/zmkfirmware/zmk --mr main
          cd zmk_workspace
          west update
          west zephyr-export
          
          # JETZT erst kopieren wir DEINE config hinein
          cp -r ../my_config/config .
          
          # Fix für den Duplikate-Fehler (falls er in Modulen auftritt)
          rm -rf modules/lib/pillbug 2>/dev/null || true

      - name: Build Left
        run: |
          cd zmk_workspace
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_left nice_view_adapter nice_view" -DZMK_CONFIG="$(pwd)/config"

      - name: Build Right
        run: |
          cd zmk_workspace
          west build -s zmk/app -b nice_nano_v2 -- -DSHIELD="splitkb_aurora_corne_right" -DZMK_CONFIG="$(pwd)/config"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Aurora_Corne_Firmware
          path: |
            zmk_workspace/build/zephyr/zmk.uf2
