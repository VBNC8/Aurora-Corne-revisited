CONFIG_ZMK_BLE=y

# Display Support (nice!view)
CONFIG_ZMK_DISPLAY=y
# Den Sharp-Treiber explizit aktivieren (das löst den 'undefined reference' Fehler)
CONFIG_SHARP_DISP=y

# Wichtig für die Kommunikation
CONFIG_SPI=y

# Grafisches Framework aktivieren
CONFIG_LVGL=y
CONFIG_ZMK_LV_FONT_DEFAULT_SMALL_MONTSERRAT_26=y

# RGB Underglow / Backlight
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Encoder Support (Links EC11)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Maus-Support (für das Scrollrad rechts)
CONFIG_ZMK_MOUSE=y
# Maus-Support aktivieren
CONFIG_ZMK_POINTING=y

# Bluetooth Optimierung
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
